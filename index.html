<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control de Asistencia - Planta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    button, .card-click { touch-action: manipulation; }
    body { -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans pb-24">

  <header class="bg-slate-900 border-b border-slate-800 py-4 px-4 sticky top-0 z-40 shadow-lg text-center">
    <h1 id="app-titulo-pantalla" class="text-base font-bold text-white tracking-wide uppercase">Pantalla Inicio</h1>
    <p class="text-slate-500 text-[10px] mt-0.5">Control de Planta Sincronizado</p>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    
    <section id="pestaña-inicio" class="tab-content block space-y-4">
      <div class="bg-slate-900 rounded-2xl p-5 border border-slate-800 shadow-xl">
        <h2 class="text-sm font-bold text-slate-300 mb-4 uppercase tracking-wider">Resumen del Día en Tiempo Real</h2>
        
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
            <span class="text-2xl">🛡️</span>
            <div id="dash-asistieron-charla" class="text-xl font-mono font-bold text-indigo-400 mt-1">...</div>
            <p class="text-[10px] text-slate-500 font-medium uppercase mt-0.5">Asistieron Charla</p>
          </div>
          
          <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
            <span class="text-2xl">🏭</span>
            <div id="dash-en-planta" class="text-xl font-mono font-bold text-emerald-400 mt-1">...</div>
            <p class="text-[10px] text-slate-500 font-medium uppercase mt-0.5">En Planta</p>
          </div>
          
          <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
            <span class="text-2xl">🚪</span>
            <div id="dash-ingresos-totales" class="text-xl font-mono font-bold text-amber-400 mt-1">...</div>
            <p class="text-[10px] text-slate-500 font-medium uppercase mt-0.5">Ingresos Totales</p>
          </div>
          
          <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
            <span class="text-2xl">🗣️</span>
            <div id="dash-charlas-dadas" class="text-xl font-mono font-bold text-purple-400 mt-1">...</div>
            <p class="text-[10px] text-slate-500 font-medium uppercase mt-0.5">Charlas Dadas</p>
          </div>
        </div>

        <button onclick="cargarDatosEscritorio()" class="w-full mt-4 bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold py-2.5 px-4 rounded-xl text-xs tracking-wide border border-slate-700 transition-all">
          🔄 ACTUALIZAR INDICADORES
        </button>
      </div>
    </section>

    <section id="pestaña-charlas" class="tab-content hidden space-y-4">
      <div class="bg-slate-900 rounded-2xl p-5 border border-slate-800 shadow-xl space-y-3.5">
        <h2 class="text-sm font-bold text-slate-300 uppercase tracking-wider">Crear Nueva Charla</h2>
        
        <div class="space-y-2.5">
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tipo de Charla</label>
              <input type="text" id="charla-tipo" placeholder="Ej. Seguridad" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Duración (Min)</label>
              <input type="number" id="charla-duracion" placeholder="Ej. 5" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
            </div>
          </div>
          
          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tema Central</label>
            <input type="text" id="charla-tema" placeholder="Nombre de la charla..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
          </div>

          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Lugar / Módulo</label>
              <input type="text" id="charla-lugar" placeholder="Ej. Taller" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Instructor Responsable</label>
              <input type="text" id="charla-instructor" placeholder="Nombre instructor..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
            </div>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Aspectos Tratados</label>
            <textarea id="charla-aspectos" rows="2" placeholder="Detalles u observaciones de la sesión..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500 resize-none"></textarea
